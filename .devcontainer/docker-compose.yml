version: "3.9"

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
    environment:
      RAILS_ENV: development
      NODE_ENV: development
      BUNDLE_PATH: /workspace/.bundle
      BUNDLE_BIN: /workspace/.bundle/bin
      GEM_HOME: /workspace/.bundle
      GEM_PATH: /workspace/.bundle:/usr/local/bundle
      CHROME_BIN: /usr/bin/chromium
      CHROMEDRIVER_PATH: /usr/bin/chromedriver
      PGHOST: db
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgres://postgres:postgres@db:5432/todo_development
    ports:
      - "3000:3000"
    command: sleep infinity
    tmpfs:
      - /workspace/node_modules:uid=1000,gid=1000
    depends_on:
      - db
      - redis

  db:
    image: postgres:13
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todo_development
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  postgres-data:
